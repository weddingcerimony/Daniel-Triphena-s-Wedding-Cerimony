<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verify Invitation</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Manrope,sans-serif;color:#fff;background:radial-gradient(circle at 15% 15%,rgba(255,109,42,.25),transparent 28%),linear-gradient(135deg,#151110,#241714,#151110)}
.card{width:min(560px,100%);padding:42px;border-radius:28px;background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12)}
h1{font-family:"Cormorant Garamond",serif;font-size:3rem;margin:.2em 0}.eyebrow,.sub,label,.back{color:#bdbdbd}.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase}.sub{margin-bottom:22px}label{display:block;margin:16px 0 8px;font-size:12px}
input{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff}
button{margin-top:22px;width:100%;padding:14px;border:none;border-radius:999px;background:#ff6d2a;color:#fff;font-weight:600;cursor:pointer}.result{display:none;margin-top:20px;padding:16px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12)}.show{display:block}.back{display:inline-block;margin-top:20px;text-decoration:none}
</style></head><body><div class="card"><div class="eyebrow">PRIVATE RECEPTION ACCESS</div><h1>Verify Your Invitation</h1><div class="sub">Enter your first and last name exactly as written on your invitation.</div><form id="checkForm"><label for="nome">First Name</label><input id="nome" autocomplete="given-name" required><label for="cognome">Last Name</label><input id="cognome" autocomplete="family-name" required><button id="submitBtn">Verify Invitation</button></form><div id="result" class="result"></div><a class="back" href="index.html">← Back to Home</a></div><script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyLX1cYwufZJ4tfPB-psNRFFbIcYhOh25WYCSoScwVXDIcDNAXG4KJ8fY8npmPntjSxIQ/exec";
document.getElementById("checkForm").addEventListener("submit",async e=>{
e.preventDefault();
const nome=document.getElementById("nome").value.trim();
const cognome=document.getElementById("cognome").value.trim();
const btn=document.getElementById("submitBtn"),resBox=document.getElementById("result");
btn.disabled=true;btn.textContent="Verifying...";
try{
const r=await fetch(`${SCRIPT_URL}?nome=${encodeURIComponent(nome)}&cognome=${encodeURIComponent(cognome)}`);
if(!r.ok)throw new Error("HTTP "+r.status);
const data=await r.json();
resBox.classList.add("show");
resBox.innerHTML="<pre>"+JSON.stringify(data,null,2)+"</pre>";
}catch(err){resBox.classList.add("show");resBox.innerHTML="Error: "+err.message;}
btn.disabled=false;btn.textContent="Verify Invitation";
});
</script></body></html>
