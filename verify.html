<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#151110;--bg2:#241714;--accent:#ff6d2a;--text:#fff;--muted:#bdbdbd;--glass:rgba(255,255,255,.06);--line:rgba(255,255,255,.12);}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Manrope,sans-serif;color:#fff;background:radial-gradient(circle at 15% 15%,rgba(255,109,42,.25),transparent 28%),radial-gradient(circle at 80% 75%,rgba(255,109,42,.12),transparent 25%),linear-gradient(135deg,var(--bg),var(--bg2),var(--bg));}
.card{width:min(620px,100%);padding:42px;border-radius:28px;background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--line)}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
h1{font-family:"Cormorant Garamond",serif;font-size:3.4rem;margin:.2em 0}
.sub{color:var(--muted);margin-bottom:24px}
label{display:block;margin:18px 0 8px;color:var(--muted);font-size:12px;text-transform:uppercase}

input{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid var(--line);
background:rgba(255,255,255,.04);
color:#fff;
font-family:'Manrope',sans-serif;
font-size:16px;
-webkit-appearance:none;
appearance:none;
}
 
 button{width:100%;margin-top:22px;padding:15px;border:none;border-radius:999px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
.result{display:none;margin-top:22px;padding:22px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid var(--line);animation:fade .35s}
.result.show{display:block}
.result h3{margin-bottom:8px}
.details{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);line-height:1.8}
.back{display:inline-block;margin-top:20px;color:var(--muted);text-decoration:none}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="card">
<div class="eyebrow">PRIVATE RECEPTION ACCESS</div>
<h1>Verify Your Invitation</h1>
<div class="sub">Enter your first and last name exactly as written on your invitation.</div>

<form id="checkForm">
<label>First Name</label>
<input id="nome" required autocomplete="given-name">
<label>Last Name</label>
<input id="cognome" required autocomplete="family-name">
<button id="submitBtn">Verify Invitation</button>
</form>

<div id="result" class="result"></div>

<a class="back" href="index.html">← Back to Home</a>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzjP1LgTP2v8E4bd1EmRpgxrBccfq7-s9XCPYiA57ZOLGRj-c1mpXC7cZkPHTwqXrgmgA/exec";

const BANK={holder:"[Account Holder]",iban:"[IBAN]",reference:"Daniel & Tryphena Wedding"};
const RECEPTION={venue:"[Venue]",address:"[Address]",time:"[Time]",parking:"[Parking]"};

const form=document.getElementById("checkForm");
const btn=document.getElementById("submitBtn");
const box=document.getElementById("result");

form.addEventListener("submit",async(e)=>{
 e.preventDefault();
 btn.disabled=true;
 btn.textContent="Verifying...";
 box.className="result";
 try{
   const nome=document.getElementById("nome").value.trim();
   const cognome=document.getElementById("cognome").value.trim();
   const r=await fetch(`${SCRIPT_URL}?nome=${encodeURIComponent(nome)}&cognome=${encodeURIComponent(cognome)}`);
   if(!r.ok) throw new Error("HTTP "+r.status);
   const data=await r.json();

   if(data.status==="pending"){
      box.innerHTML=`<h3>🎉 Welcome, ${nome}!</h3>
      <p>Your invitation has been verified. To complete your attendance, please use the bank details below.</p>
      <div class="details">
      <strong>Account Holder</strong><br>${BANK.holder}<br><br>
      <strong>IBAN</strong><br>${BANK.iban}<br><br>
      <strong>Reference</strong><br>${BANK.reference}
      </div>`;
   }else if(data.status==="confirmed"){
      box.innerHTML=`<h3>✅ You're all set!</h3>
      <p>Your attendance has been confirmed.</p>
      <div class="details">
      <strong>Venue</strong><br>${RECEPTION.venue}<br><br>
      <strong>Address</strong><br>${RECEPTION.address}<br><br>
      <strong>Time</strong><br>${RECEPTION.time}<br><br>
      <strong>Parking</strong><br>${RECEPTION.parking}
      </div>`;
   }else if(data.status==="not_found"){
      box.innerHTML="<h3>Sorry!</h3><p>We couldn't find your invitation. Please contact the couple if you think this is a mistake.</p>";
   }else{
      box.innerHTML="<h3>Error</h3><p>An unexpected response was received.</p>";
   }
 }catch(err){
   box.innerHTML=`<h3>Connection error</h3><p>${err.message}</p>`;
 }
 box.classList.add("show");
 btn.disabled=false;
 btn.textContent="Verify Invitation";
});
</script>
</body></html>
