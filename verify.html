<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifica invito — Daniel & Tryphena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://script.google.com/macros/s/AKfycbwN9mvAacFpnbQU4wMz2d1jqnLJpn7bm97mJOQMXGgw2HDP46Ed3QpuxV7C6Mfml2IUNw/exec">
<style>
  :root{
    --ink:#2a211b;
    --gold:#b8935a;
    --gold-soft:#d9c3a0;
    --forest:#33422f;
    --cream:#f6f1e7;
    --paper:#fbf8f2;
    --line: rgba(42,33,27,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    font-weight:300;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  h1,h2{font-family:'Cormorant Garamond', serif; font-weight:500;}
  .box{
    max-width:420px;
    width:100%;
    background:var(--paper);
    border:1px solid var(--line);
    padding:38px 32px;
    text-align:center;
  }
  .eyebrow{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.24em;
    color:var(--forest);
    margin-bottom:10px;
  }
  h1{font-size:1.9rem; margin-bottom:6px;}
  .sub{font-size:0.92rem; color:#5a4c3f; margin-bottom:26px;}
  label{
    display:block;
    text-align:left;
    font-size:0.78rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#5a4c3f;
    margin:16px 0 6px;
  }
  input{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Jost', sans-serif;
    font-size:0.95rem;
    color:var(--ink);
  }
  input:focus{outline:none; border-color:var(--gold);}
  button{
    margin-top:24px;
    width:100%;
    padding:13px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    font-family:'Jost', sans-serif;
    font-size:0.9rem;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  button:hover{background:var(--gold); color:var(--ink);}
  button:disabled{opacity:0.6; cursor:default;}

  .result{
    margin-top:22px;
    padding:16px;
    font-size:0.9rem;
    text-align:left;
    display:none;
  }
  .result.show{display:block;}
  .result.ok{background:#eef1ec; border:1px solid var(--forest); color:var(--forest);}
  .result.pending{background:#f6ede4; border:1px solid #8a5a3f; color:#8a5a3f;}
  .result.notfound{background:#f6e9e9; border:1px solid #8a3f3f; color:#8a3f3f;}

  .details{margin-top:14px; line-height:1.7;}
  .details strong{color:var(--ink);}

  a.back{
    display:inline-block;
    margin-top:20px;
    font-size:0.82rem;
    color:#8a7c6d;
    text-decoration:underline;
  }
</style>
</head>
<body>

  <div class="box">
    <div class="eyebrow">Reception</div>
    <h1>Verifica il tuo invito</h1>
    <div class="sub">Inserisci nome e cognome esattamente come sull'invito.</div>

    <form id="checkForm">
      <label for="nome">Nome</label>
      <input type="text" id="nome" required autocomplete="given-name">

      <label for="cognome">Cognome</label>
      <input type="text" id="cognome" required autocomplete="family-name">

      <button type="submit" id="submitBtn">Verifica</button>
    </form>

    <div id="result" class="result"></div>

    <a class="back" href="index.html">&larr; Torna alla pagina principale</a>
  </div>

<script>
  // Sostituisci questo URL con quello del tuo Google Apps Script
  // (lo ottieni dopo il deploy, vedi README.md)
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvjPwZmf7QP6g42vwQE8PScSjjLlevn0yAGPqaGcwpG07oI3kII6O5ftjVtf0opkkTWQ/exec";

  const form = document.getElementById('checkForm');
  const resultBox = document.getElementById('result');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();

    btn.disabled = true;
    btn.textContent = "Verifica in corso...";
    resultBox.className = "result";
    resultBox.innerHTML = "";

    try{
      const url = `${SCRIPT_URL}?nome=${encodeURIComponent(nome)}&cognome=${encodeURIComponent(cognome)}`;
      const res = await fetch(url);
      const data = await res.json();

      if(data.status === "not_found"){
        resultBox.className = "result notfound show";
        resultBox.innerHTML = "Non troviamo il tuo nome nella lista invitati. Contatta Daniel o Tryphena se pensi sia un errore.";
      } else if(data.status === "pending"){
        resultBox.className = "result pending show";
        resultBox.innerHTML = "Ti abbiamo trovato nella lista! Risulta però che la quota non sia ancora stata versata. Contattaci per completare il pagamento e sbloccare i dettagli della reception.";
      } else if(data.status === "confirmed"){
        resultBox.className = "result ok show";
        resultBox.innerHTML = `
          <strong>Benvenuto/a, ${nome}!</strong><br><br>
          <div class="details">
            <strong>Location:</strong> [Nome venue]<br>
            <strong>Indirizzo:</strong> [Indirizzo completo]<br>
            <strong>Parcheggio:</strong> [Info parcheggio]<br>
            <strong>Dress code:</strong> [Dress code]<br>
            <strong>Orario:</strong> [Orario reception]
          </div>`;
      } else {
        resultBox.className = "result notfound show";
        resultBox.innerHTML = "Si è verificato un errore. Riprova tra poco.";
      }
    } catch(err){
      resultBox.className = "result notfound show";
      resultBox.innerHTML = "Impossibile contattare il sistema di verifica. Riprova tra poco.";
    }

    btn.disabled = false;
    btn.textContent = "Verifica";
  });
</script>

</body>
</html>
