<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Reception Access — Daniel & Tryphena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2a211b;
    --gold:#b8935a;
    --gold-soft:#d9c3a0;
    --forest:#33422f;
    --cream:#f6f1e7;
    --paper:#fbf8f2;
    --line: rgba(42,33,27,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:radial-gradient(circle at 15% 15%, rgba(255,109,42,.22), transparent 28%),linear-gradient(135deg,#151110,#241714,#151110);
    color:#fff;
    font-family:'Manrope', sans-serif;
    font-weight:300;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  h1,h2{font-family:'Cormorant Garamond', serif; font-weight:500;}
  .box{
    max-width:440px;
    width:100%;
    background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border-radius:28px;
    border:1px solid var(--line);
    padding:38px 32px;
    text-align:center;
  }
  .eyebrow{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.24em;
    color:var(--forest);
    margin-bottom:10px;
  }
  h1{font-size:1.9rem; margin-bottom:6px;}
  .sub{font-size:0.92rem; color:#5a4c3f; margin-bottom:26px;}
  label{
    display:block;
    text-align:left;
    font-size:0.78rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#5a4c3f;
    margin:16px 0 6px;
  }
  input{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Manrope', sans-serif;
    font-size:0.95rem;
    color:#fff;
  }
  input:focus{outline:none; border-color:var(--gold);}
  button{
    margin-top:24px;
    width:100%;
    padding:13px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    font-family:'Manrope', sans-serif;
    font-size:0.9rem;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  button:hover{background:var(--gold); color:#fff;}
  button:disabled{opacity:0.6; cursor:default;}

  .result{
    margin-top:22px;
    padding:18px;
    font-size:0.92rem;
    text-align:left;
    display:none;
    line-height:1.6;
  }
  .result.show{display:block;}
  .result.ok{background:#eef1ec; border:1px solid var(--forest); color:var(--forest);}
  .result.pending{background:#f6ede4; border:1px solid #8a5a3f; color:#8a5a3f;}
  .result.notfound{background:#f6e9e9; border:1px solid #8a3f3f; color:#8a3f3f;}
  .result.debug{background:#eef2f6; border:1px solid #3f5a8a; color:#2a3d5a; font-family:monospace; font-size:0.8rem; word-break:break-word;}

  .details{margin-top:14px; padding-top:14px; border-top:1px solid rgba(0,0,0,0.1); line-height:1.7; color:#fff;}
  .details strong{display:inline-block; min-width:100px;}

  .pay-link{
    display:inline-block;
    margin-top:14px;
    padding:10px 18px;
    background:var(--ink);
    color:var(--paper) !important;
    text-decoration:none;
    font-size:0.85rem;
    letter-spacing:0.03em;
  }
  .pay-link:hover{background:var(--gold); color:var(--ink) !important;}

  a.back{
    display:inline-block;
    margin-top:20px;
    font-size:0.82rem;
    color:#8a7c6d;
    text-decoration:underline;
  }
</style>
</head>
<body>

  <div class="box">
    <div class="eyebrow">PRIVATE RECEPTION ACCESS</div>
    <h1>Verify Your Invitation</h1>
    <div class="sub">Enter your first and last name exactly as written on your invitation.</div>

    <form id="checkForm">
      <label for="nome">First Name</label>
      <input type="text" id="nome" required autocomplete="given-name">

      <label for="cognome">Last Name</label>
      <input type="text" id="cognome" required autocomplete="family-name">

      <button type="submit" id="submitBtn">Verify Invitation</button>
    </form>

    <div id="result" class="result"></div>

    <a class="back" href="index.html">&larr; Back to Home</a>
  </div>

<script>
  // Sostituisci questo URL con quello del tuo Google Apps Script (finisce in /exec)
  const SCRIPT_URL = "INCOLLA_QUI_URL_APPS_SCRIPT";

  // Personalizza questi valori:
  const IMPORTO_DA_PAGARE = "100"; // es. importo in euro
  const LINK_PAGAMENTO = "#"; // es. link PayPal, Satispay, bonifico ecc. (opzionale)
  const NUMERO_CONTATTO = "+39 000 000 0000"; // numero da mostrare a chi non è in lista

  // Dati bancari mostrati a chi risulta in lista ma non ha ancora pagato
  const DATI_BANCARI = {
    intestatario: "[Nome Cognome intestatario conto]",
    iban: "[IT00 A000 0000 0000 0000 0000 000]",
    causale: "[Nome Cognome] - Matrimonio Daniel & Tryphena"
  };

  // Dettagli reception — compilali una volta sola qui
  const DETTAGLI_RECEPTION = {
    location: "[Nome venue]",
    indirizzo: "[Indirizzo completo]",
    parcheggio: "[Info parcheggio]",
    orario: "[Orario reception]",
    menu: "[Descrizione menu / link al menu]"
  };

  const form = document.getElementById('checkForm');
  const resultBox = document.getElementById('result');
  const btn = document.getElementById('submitBtn');

  function bankHTML(){
    return `
      <div class="details">
        <div><strong>Intestatario:</strong> ${DATI_BANCARI.intestatario}</div>
        <div><strong>IBAN:</strong> ${DATI_BANCARI.iban}</div>
        <div><strong>Causale:</strong> ${DATI_BANCARI.causale}</div>
      </div>`;
  }

  function detailsHTML(){
    return `
      <div class="details">
        <div><strong>Location:</strong> ${DETTAGLI_RECEPTION.location}</div>
        <div><strong>Indirizzo:</strong> ${DETTAGLI_RECEPTION.indirizzo}</div>
        <div><strong>Parcheggio:</strong> ${DETTAGLI_RECEPTION.parcheggio}</div>
        <div><strong>Orario:</strong> ${DETTAGLI_RECEPTION.orario}</div>
        <div><strong>Menu:</strong> ${DETTAGLI_RECEPTION.menu}</div>
      </div>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();

    btn.disabled = true;
    btn.textContent = "Verifica in corso...";
    resultBox.className = "result";
    resultBox.innerHTML = "";

    try{
      const url = `${SCRIPT_URL}?nome=${encodeURIComponent(nome)}&cognome=${encodeURIComponent(cognome)}`;
      const res = await fetch(url);

      if(!res.ok){
        throw new Error("HTTP " + res.status);
      }

      const data = await res.json();

      if(data.status === "not_found"){
        resultBox.className = "result notfound show";
        resultBox.innerHTML = `Sorry, non risulti nella lista invitati. Per informazioni contattaci al ${NUMERO_CONTATTO}.`;

      } else if(data.status === "pending"){
        resultBox.className = "result pending show";
        resultBox.innerHTML = `
          <strong>Ciao ${nome}!</strong> Ti abbiamo trovato nella lista.<br>
          Ricordati di completare la quota di partecipazione (€${IMPORTO_DA_PAGARE}) per confermare la tua presenza, tramite bonifico ai dati qui sotto${LINK_PAGAMENTO !== "#" ? ' oppure tramite il link' : ''}.
          ${bankHTML()}
          ${LINK_PAGAMENTO !== "#" ? `<a class="pay-link" href="${LINK_PAGAMENTO}" target="_blank">Vai al pagamento &rarr;</a>` : ''}
          ${detailsHTML()}`;

      } else if(data.status === "confirmed"){
        resultBox.className = "result ok show";
        resultBox.innerHTML = `<strong>Benvenuto/a, ${nome}!</strong> La tua presenza è confermata.${detailsHTML()}`;

      } else if(data.status === "error"){
        // Errore riportato dallo script stesso (es. nome foglio sbagliato) —
        // mostrato in chiaro per capire subito cosa sistemare
        resultBox.className = "result debug show";
        resultBox.innerHTML = "Errore dallo script: " + (data.message || "sconosciuto");

      } else {
        resultBox.className = "result notfound show";
        resultBox.innerHTML = "Si è verificato un errore. Riprova tra poco.";
      }
    } catch(err){
      resultBox.className = "result debug show";
      resultBox.innerHTML = "Impossibile contattare il sistema di verifica.<br>Dettaglio tecnico: " + err.message;
    }

    btn.disabled = false;
    btn.textContent = "Verifica";
  });
</script>

</body>
</html>
