<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--bg:#151110;
--bg2:#241714;

--accent:#ff6d2a;

--text:#ffffff;
--muted:#bdbdbd;

--glass:rgba(255,255,255,.06);
--line:rgba(255,255,255,.12);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:24px;

font-family:Manrope,sans-serif;

background:

radial-gradient(circle at 15% 15%,rgba(255,109,42,.25),transparent 28%),
radial-gradient(circle at 80% 75%,rgba(255,109,42,.12),transparent 25%),
linear-gradient(135deg,var(--bg),var(--bg2),var(--bg));

color:white;

}

.card{

width:min(620px,100%);

background:var(--glass);

backdrop-filter:blur(24px);

border:1px solid var(--line);

border-radius:30px;

padding:42px;

}

.eyebrow{

font-size:12px;

letter-spacing:.18em;

text-transform:uppercase;

color:var(--muted);

}

h1{

font-family:"Cormorant Garamond",serif;

font-size:3.2rem;

font-weight:600;

margin:8px 0;

}

.subtitle{

color:var(--muted);

margin-bottom:26px;

line-height:1.6;

}

label{

display:block;

margin-top:18px;
margin-bottom:8px;

font-size:12px;

letter-spacing:.08em;

text-transform:uppercase;

color:var(--muted);

}

input{

width:100%;

padding:14px 16px;

border-radius:14px;

background:rgba(255,255,255,.04);

border:1px solid var(--line);

font-size:15px;

color:white;

}

input:focus{

outline:none;

border-color:var(--accent);

}

button{

margin-top:28px;

width:100%;

padding:15px;

border:none;

border-radius:999px;

background:var(--accent);

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:translateY(-2px);

}

.result{

display:none;

margin-top:28px;

padding:22px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid var(--line);

animation:fade .3s;

}

.result.show{

display:block;

}

.result h3{

margin-bottom:10px;

}

.details{

margin-top:18px;

padding-top:18px;

border-top:1px solid var(--line);

line-height:1.8;

}

.back{

display:inline-block;

margin-top:26px;

color:var(--muted);

text-decoration:none;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(10px);

}

to{

opacity:1;
transform:none;

}

}

</style>

</head>

<body>

<div class="card">

<div class="eyebrow">

PRIVATE RECEPTION ACCESS

</div>

<h1>

Verify Your Invitation

</h1>

<div class="subtitle">

Enter your first name and last name exactly as written on your invitation.

</div>

<form id="form">

<label>

First Name

</label>

<input
id="firstName"
required
autocomplete="given-name">

<label>

Last Name

</label>

<input
id="lastName"
required
autocomplete="family-name">

<button>

Verify Invitation

</button>

</form>

<div
class="result"
id="result">

</div>

<a
class="back"
href="index.html">

← Back to Home

</a>

</div>

<script>

const SCRIPT_URL = "INCOLLA_QUI_IL_TUO_URL_EXEC";

const result = document.getElementById("result");

const form = document.getElementById("form");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const firstName=document.getElementById("firstName").value.trim();

const lastName=document.getElementById("lastName").value.trim();

result.className="result";

result.innerHTML="";

try{

const response=await fetch(

`${SCRIPT_URL}?nome=${encodeURIComponent(firstName)}&cognome=${encodeURIComponent(lastName)}`

);

const data=await response.json();

if(data.status==="confirmed"){

result.innerHTML=`

<h3>✅ Welcome ${firstName}!</h3>

<p>Your invitation has been confirmed.</p>

<div class="details">

<strong>Reception</strong><br>

Venue: [Venue]<br>

Time: [Time]<br>

Parking: [Parking]<br>

Dress Code: Formal

</div>

`;

}

else if(data.status==="pending"){

result.innerHTML=`

<h3>🎉 Welcome ${firstName}!</h3>

<p>

Your invitation has been found.

Please complete your contribution using the information below.

</p>

<div class="details">

<strong>Account Holder</strong><br>

[Account Holder]<br><br>

<strong>IBAN</strong><br>

[IBAN]<br><br>

<strong>Reference</strong><br>

Daniel & Tryphena Wedding

</div>

`;

}

else{

result.innerHTML=`

<h3>Sorry</h3>

<p>

We couldn't find your invitation.

Please contact the couple if you believe this is a mistake.

</p>

`;

}

result.classList.add("show");

}

catch(err){

console.error(err);

result.innerHTML=`
<h3>Connection Error</h3>

<p>${err.message}</p>

`;
}

`;

result.classList.add("show");

}

});

</script>

</body>

</html>
