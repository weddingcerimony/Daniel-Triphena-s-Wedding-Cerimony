<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifica invito — Daniel & Tryphena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2a211b;
    --gold:#b8935a;
    --gold-soft:#d9c3a0;
    --forest:#33422f;
    --cream:#f6f1e7;
    --paper:#fbf8f2;
    --line: rgba(42,33,27,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    font-weight:300;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  h1,h2{font-family:'Cormorant Garamond', serif; font-weight:500;}
  .box{
    max-width:440px;
    width:100%;
    background:var(--paper);
    border:1px solid var(--line);
    padding:38px 32px;
    text-align:center;
  }
  .eyebrow{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.24em;
    color:var(--forest);
    margin-bottom:10px;
  }
  h1{font-size:1.9rem; margin-bottom:6px;}
  .sub{font-size:0.92rem; color:#5a4c3f; margin-bottom:26px;}
  label{
    display:block;
    text-align:left;
    font-size:0.78rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#5a4c3f;
    margin:16px 0 6px;
  }
  input{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Jost', sans-serif;
    font-size:0.95rem;
    color:var(--ink);
  }
  input:focus{outline:none; border-color:var(--gold);}
  button{
    margin-top:24px;
    width:100%;
    padding:13px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    font-family:'Jost', sans-serif;
    font-size:0.9rem;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  button:hover{background:var(--gold); color:var(--ink);}
  button:disabled{opacity:0.6; cursor:default;}

  .result{
    margin-top:22px;
    padding:18px;
    font-size:0.92rem;
    text-align:left;
    display:none;
    line-height:1.6;
  }
  .result.show{display:block;}
  .result.ok{background:#eef1ec; border:1px solid var(--forest); color:var(--forest);}
  .result.pending{background:#f6ede4; border:1px solid #8a5a3f; color:#8a5a3f;}
  .result.notfound{background:#f6e9e9; border:1px solid #8a3f3f; color:#8a3f3f;}

  .details{margin-top:14px; padding-top:14px; border-top:1px solid rgba(0,0,0,0.1); line-height:1.7; color:var(--ink);}
  .details strong{display:inline-block; min-width:100px;}

  .pay-link{
    display:inline-block;
    margin-top:14px;
    padding:10px 18px;
    background:var(--ink);
    color:var(--paper) !important;
    text-decoration:none;
    font-size:0.85rem;
    letter-spacing:0.03em;
  }
  .pay-link:hover{background:var(--gold); color:var(--ink) !important;}

  a.back{
    display:inline-block;
    margin-top:20px;
    font-size:0.82rem;
    color:#8a7c6d;
    text-decoration:underline;
  }
</style>
</head>
<body>

  <div class="box">
    <div class="eyebrow">Reception</div>
    <h1>Verifica il tuo invito</h1>
    <div class="sub">Inserisci nome e cognome esattamente come sull'invito.</div>

    <form id="checkForm">
      <label for="nome">Nome</label>
      <input type="text" id="nome" required autocomplete="given-name">

      <label for="cognome">Cognome</label>
      <input type="text" id="cognome" required autocomplete="family-name">

      <button type="submit" id="submitBtn">Verifica</button>
    </form>

    <div id="result" class="result"></div>

    <a class="back" href="index.html">&larr; Torna alla pagina principale</a>
  </div>

<script>
  // Sostituisci questo URL con quello del tuo Google Apps Script
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCC0ITqThylJSf_ddK7avQ7A9Hnv2tbkT4Zqwgkytg25ZK2t9DRy5ZvlJ2oKpCcZe57A/exec";

  // Personalizza questi valori:
  const IMPORTO_DA_PAGARE = "100"; // es. importo in euro
  const LINK_PAGAMENTO = "#"; // es. link PayPal, Satispay, bonifico ecc.
  const NUMERO_CONTATTO = "+39 000 000 0000"; // numero da mostrare a chi non è in lista

  // Dettagli reception — compilali una volta sola qui
  const DETTAGLI_RECEPTION = {
    location: "[Nome venue]",
    indirizzo: "[Indirizzo completo]",
    parcheggio: "[Info parcheggio]",
    orario: "[Orario reception]",
    menu: "[Descrizione menu / link al menu]"
  };

  const form = document.getElementById('checkForm');
  const resultBox = document.getElementById('result');
  const btn = document.getElementById('submitBtn');

  function detailsHTML(){
    return `
      <div class="details">
        <div><strong>Location:</strong> ${DETTAGLI_RECEPTION.location}</div>
        <div><strong>Indirizzo:</strong> ${DETTAGLI_RECEPTION.indirizzo}</div>
        <div><strong>Parcheggio:</strong> ${DETTAGLI_RECEPTION.parcheggio}</div>
        <div><strong>Orario:</strong> ${DETTAGLI_RECEPTION.orario}</div>
        <div><strong>Menu:</strong> ${DETTAGLI_RECEPTION.menu}</div>
      </div>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();

    btn.disabled = true;
    btn.textContent = "Verifica in corso...";
    resultBox.className = "result";
    resultBox.innerHTML = "";

    try{
      const url = `${SCRIPT_URL}?nome=${encodeURIComponent(nome)}&cognome=${encodeURIComponent(cognome)}`;
      const res = await fetch(url);
      const data = await res.json();

      if(data.status === "not_found"){
        resultBox.className = "result notfound show";
        resultBox.innerHTML = `Sorry, non risulti nella lista invitati. Per informazioni contattaci al ${NUMERO_CONTATTO}.`;

      } else if(data.status === "pending"){
        resultBox.className = "result pending show";
        resultBox.innerHTML = `
          <strong>Ciao ${nome}!</strong> Ti abbiamo trovato nella lista.<br>
          Ricordati di completare la quota di partecipazione (€${IMPORTO_DA_PAGARE}) per confermare la tua presenza.
          <br><a class="pay-link" href="${LINK_PAGAMENTO}" target="_blank">Vai al pagamento &rarr;</a>
          ${detailsHTML()}`;

      } else if(data.status === "confirmed"){
        resultBox.className = "result ok show";
        resultBox.innerHTML = `<strong>Benvenuto/a, ${nome}!</strong> La tua presenza è confermata.${detailsHTML()}`;

      } else {
        resultBox.className = "result notfound show";
        resultBox.innerHTML = "Si è verificato un errore. Riprova tra poco.";
      }
    } catch(err){
      resultBox.className = "result notfound show";
      resultBox.innerHTML = "Impossibile contattare il sistema di verifica. Riprova tra poco.";
    }

    btn.disabled = false;
    btn.textContent = "Verifica";
  });
</script>

</body>
</html>
